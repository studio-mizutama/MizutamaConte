<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- 旧ハッシュURL（/docs/#/usage 等。アプリ内Help・外部記事リンクが指す）と
         裸root（/docs/）を、locale 付きクリーンURL へ無音リダイレクトする経過措置。
         全ページの <head> に入るが、locale 付きクリーンURLでは rest!=='' で何もしない
         （= no-op・ループしない）。言語は localStorage→navigator.language→ja のカスケード。
         React より前に同期実行（チラつき防止）。 -->
    <script>
      (function () {
        var m = location.pathname.match(/^(.*\/docs\/)/);
        var base = m ? m[1] : '/';
        function pickLocale() {
          try {
            var s = localStorage.getItem('docsLocale');
            if (s === 'ja' || s === 'ko' || s === 'en') return s;
          } catch (e) {}
          var n = (navigator.language || 'ja').slice(0, 2);
          return n === 'ko' || n === 'en' ? n : 'ja';
        }
        var h = location.hash.replace(/^#\/?/, '');
        if (h) {
          var id = h.replace(/^(ja|ko|en)\//, '').replace(/\/+$/, '');
          location.replace(base + pickLocale() + '/' + (id === '' || id === 'home' ? '' : id + '/'));
          return;
        }
        var rest = location.pathname.slice(base.length).replace(/^\/+/, '').replace(/\/+$/, '');
        if (rest === '') location.replace(base + pickLocale() + '/');
      })();
    </script>
    <meta name="theme-color" content="#C9817D" />
    <link rel="icon" href="./favicon.ico" />
    <!-- Google Search Console 所有権確認（URLプレフィックス /MizutamaConte/docs/）。
         検索対象は公開ドキュメントサイトのみ。アプリ本体ページには置かない。
         追跡しない不活性トークン（GA ではない）。prerender が全ページの head に残す。 -->
    <meta name="google-site-verification" content="w50NkXx83bfPLi61rrTegQBjINChdh9gYjNWIbDEe5k" />
    <!-- description / canonical / hreflang / OGP / twitter は prerender.tsx が
         ページ・ロケール別に <head> へ注入する（静的にはここに置かない）。 -->
    <title>Mizutama Conte Docs</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
